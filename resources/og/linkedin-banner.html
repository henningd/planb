<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="utf-8">
<link rel="preconnect" href="https://fonts.bunny.net">
<link href="https://fonts.bunny.net/css?family=instrument-sans:400,500,600,700" rel="stylesheet" />
<style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
        width: 1584px;
        height: 396px;
        font-family: 'Instrument Sans', -apple-system, 'Segoe UI', Roboto, sans-serif;
        background: linear-gradient(120deg, #1e1b4b 0%, #312e81 35%, #4338ca 70%, #1d4ed8 100%);
        color: #fff;
        position: relative;
        overflow: hidden;
    }
    .glow {
        position: absolute;
        inset: 0;
        background:
            radial-gradient(ellipse 600px 320px at 92% 0%, rgba(255,255,255,0.18), transparent 60%),
            radial-gradient(ellipse 500px 300px at 55% 120%, rgba(56,189,248,0.18), transparent 55%);
    }
    .grid-pattern {
        position: absolute;
        inset: 0;
        background-image:
            linear-gradient(rgba(255,255,255,0.045) 1px, transparent 1px),
            linear-gradient(90deg, rgba(255,255,255,0.045) 1px, transparent 1px);
        background-size: 44px 44px;
        mask-image: radial-gradient(ellipse 900px 400px at 70% 50%, black 30%, transparent 78%);
        -webkit-mask-image: radial-gradient(ellipse 900px 400px at 70% 50%, black 30%, transparent 78%);
    }
    /* Profilfoto überlappt unten links — Inhalt beginnt rechts davon. */
    .content {
        position: absolute;
        left: 460px;
        right: 80px;
        top: 0;
        height: 100%;
        display: flex;
        flex-direction: column;
        justify-content: center;
        gap: 18px;
    }
    .brand { display: flex; align-items: center; gap: 14px; }
    .logo {
        width: 52px; height: 52px;
        border-radius: 14px;
        background: rgba(255,255,255,0.14);
        border: 1px solid rgba(255,255,255,0.25);
        display: flex; align-items: center; justify-content: center;
    }
    .logo svg { width: 30px; height: 30px; }
    .brand-name { font-size: 32px; font-weight: 700; letter-spacing: -0.4px; }
    h1 {
        font-size: 46px;
        font-weight: 700;
        line-height: 1.15;
        letter-spacing: -1px;
    }
    h1 .accent { color: #a5b4fc; }
    .row { display: flex; align-items: center; gap: 24px; }
    .chips { display: flex; gap: 10px; }
    .chip {
        padding: 7px 16px;
        border-radius: 999px;
        background: rgba(255,255,255,0.12);
        border: 1px solid rgba(255,255,255,0.22);
        font-size: 17px;
        font-weight: 600;
    }
    .domain { font-size: 19px; font-weight: 500; color: rgba(255,255,255,0.78); }
</style>
</head>
<body>
    <div class="glow"></div>
    <div class="grid-pattern"></div>
    <div class="content">
        <div class="brand">
            <div class="logo">
                <svg viewBox="0 0 24 24" fill="none" stroke="#fff" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
                </svg>
            </div>
            <div class="brand-name">PlanB</div>
        </div>
        <h1>Digitales Notfallhandbuch &amp; <span class="accent">Krisenmanagement</span><br>für den Mittelstand</h1>
        <div class="row">
            <div class="chips">
                <div class="chip">NIS2</div>
                <div class="chip">BSI 200-4</div>
                <div class="chip">DSGVO</div>
            </div>
            <div class="domain">planb.uniguard.cloud</div>
        </div>
    </div>
</body>
</html>
