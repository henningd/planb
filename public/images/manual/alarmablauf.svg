<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 1010" font-family="ui-sans-serif, system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#64748B"/>
    </marker>
  </defs>

  <!-- ====== Auslöser ====== -->
  <g>
    <rect x="20" y="16" width="260" height="66" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="150" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">Notfall-App</text>
    <text x="150" y="62" text-anchor="middle" font-size="12" fill="#475569">Mitarbeiter löst am Handy aus</text>

    <rect x="320" y="16" width="260" height="66" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="450" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">Web-Cockpit</text>
    <text x="450" y="62" text-anchor="middle" font-size="12" fill="#475569">Leitung löst im Browser aus</text>

    <rect x="620" y="16" width="260" height="66" rx="12" fill="#F8FAFC" stroke="#CBD5E1"/>
    <text x="750" y="42" text-anchor="middle" font-size="15" font-weight="600" fill="#0F172A">IT-Monitoring</text>
    <text x="750" y="62" text-anchor="middle" font-size="12" fill="#475569">kritischer Alert startet automatisch*</text>
  </g>
  <path d="M150 82 C150 110 380 106 435 128" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M450 82 L450 128" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M750 82 C750 110 520 106 465 128" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Minute 0 ====== -->
  <rect x="250" y="132" width="400" height="58" rx="12" fill="#E11D48"/>
  <text x="450" y="157" text-anchor="middle" font-size="16" font-weight="700" fill="#FFFFFF">Minute 0 — Notfall ausgelöst</text>
  <text x="450" y="177" text-anchor="middle" font-size="12" fill="#FFE4E6">Ablauf startet, Checkliste wird geöffnet</text>

  <path d="M450 190 L450 218" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="450" y="238" text-anchor="middle" font-size="13" font-weight="600" fill="#64748B" letter-spacing="1">SOFORT &amp; AUTOMATISCH</text>

  <!-- ====== Sofort-Aktionen (2x2) ====== -->
  <g>
    <rect x="40" y="252" width="395" height="74" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="60" y="278" font-size="14" font-weight="600" fill="#3730A3">Push an alle Geräte</text>
    <text x="60" y="297" font-size="12" fill="#475569">zeitkritisch — durchbricht „Nicht stören" und Schlaf-Fokus;</text>
    <text x="60" y="313" font-size="12" fill="#475569">Android weckt das gesperrte Gerät als Vollbild-Alarm</text>

    <rect x="465" y="252" width="395" height="74" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="485" y="278" font-size="14" font-weight="600" fill="#3730A3">Karte in Slack / Microsoft Teams</text>
    <text x="485" y="297" font-size="12" fill="#475569">in den hinterlegten Krisen-Kanal —</text>
    <text x="485" y="313" font-size="12" fill="#475569">sofern eine Webhook-URL konfiguriert ist</text>

    <rect x="40" y="340" width="395" height="74" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="60" y="366" font-size="14" font-weight="600" fill="#3730A3">Eintrag im Krisenprotokoll</text>
    <text x="60" y="385" font-size="12" fill="#475569">revisionssicher mit Zeitstempel und Auslöser —</text>
    <text x="60" y="401" font-size="12" fill="#475569">jeder weitere Schritt wird mitprotokolliert</text>

    <rect x="465" y="340" width="395" height="74" rx="12" fill="#EEF2FF" stroke="#C7D2FE"/>
    <text x="485" y="366" font-size="14" font-weight="600" fill="#3730A3">„Aktiver Notfall" überall sichtbar</text>
    <text x="485" y="385" font-size="12" fill="#475569">rote Karte in beiden Apps und im Web-Cockpit;</text>
    <text x="485" y="401" font-size="12" fill="#475569">Checkliste mit Schritten und Zuständigkeiten liegt bereit</text>
  </g>

  <path d="M450 414 L450 444" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Quittierungsfenster ====== -->
  <rect x="150" y="448" width="600" height="76" rx="12" fill="#4F46E5"/>
  <text x="450" y="478" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Quittierungsfenster — Standard 10 Minuten (einstellbar)</text>
  <text x="450" y="500" text-anchor="middle" font-size="12.5" fill="#E0E7FF">Jede/r tippt in der App „Gesehen" oder „Ich übernehme" — der Stand ist für alle live sichtbar</text>

  <path d="M300 524 C300 550 237 546 237 572" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M600 524 C600 550 663 546 663 572" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Verzweigung ====== -->
  <g>
    <rect x="40" y="576" width="395" height="168" rx="12" fill="#ECFDF5" stroke="#6EE7B7"/>
    <text x="60" y="606" font-size="15" font-weight="700" fill="#065F46">Jemand übernimmt ✓</text>
    <text x="60" y="632" font-size="12.5" fill="#334155">Keine Eskalation nötig.</text>
    <text x="60" y="652" font-size="12.5" fill="#334155">Das Team arbeitet die Checkliste ab und hakt</text>
    <text x="60" y="668" font-size="12.5" fill="#334155">Schritte ab — auch ohne Internet; der Fortschritt</text>
    <text x="60" y="684" font-size="12.5" fill="#334155">wird automatisch synchronisiert, alle sehen</text>
    <text x="60" y="700" font-size="12.5" fill="#334155">denselben Stand.</text>
    <text x="60" y="726" font-size="11.5" font-style="italic" fill="#64748B">Wer übernommen hat, steht für alle sichtbar am Ablauf.</text>

    <rect x="465" y="576" width="395" height="168" rx="12" fill="#FFFBEB" stroke="#FCD34D"/>
    <text x="485" y="606" font-size="15" font-weight="700" fill="#92400E">Niemand quittiert → Eskalation</text>
    <text x="485" y="630" font-size="12.5" font-weight="600" fill="#334155">Nach Ablauf der Frist, automatisch und einmalig:</text>
    <text x="485" y="652" font-size="12.5" fill="#334155">•  dringlicher, erneuter Push an alle Geräte</text>
    <text x="485" y="672" font-size="12.5" font-weight="600" fill="#9F1239">•  SMS an den gesamten Krisenstab inkl. Vertretungen</text>
    <text x="485" y="692" font-size="12.5" fill="#334155">•  Hinweis in Slack/Teams + Eintrag im Krisenprotokoll</text>
    <text x="485" y="712" font-size="12.5" fill="#334155">•  Eskalations-Banner im Ablauf-Detail der App</text>
    <text x="485" y="734" font-size="11.5" font-style="italic" fill="#64748B">SMS erreichen jedes Handy — ohne App, ohne Internet.</text>
  </g>

  <path d="M237 744 C237 776 380 772 435 794" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M663 744 C663 776 520 772 465 794" fill="none" stroke="#64748B" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ====== Entwarnung ====== -->
  <rect x="200" y="798" width="500" height="70" rx="12" fill="#334155"/>
  <text x="450" y="826" text-anchor="middle" font-size="15" font-weight="700" fill="#FFFFFF">Entwarnung — Notfall beendet oder abgebrochen</text>
  <text x="450" y="848" text-anchor="middle" font-size="12.5" fill="#CBD5E1">Push + Chat-Karte an alle; der komplette Verlauf steht im Krisenprotokoll</text>

  <!-- ====== Fußnoten ====== -->
  <rect x="40" y="896" width="820" height="94" rx="12" fill="#F8FAFC" stroke="#CBD5E1" stroke-dasharray="5 4"/>
  <text x="60" y="922" font-size="12.5" fill="#334155"><tspan font-weight="700">Übung (Testalarm):</tspan>  gleicher Ablauf mit deutlicher ÜBUNG-Kennzeichnung — aber ohne Eskalation, ohne Vollbild-Alarm</text>
  <text x="60" y="940" font-size="12.5" fill="#334155">und ohne Dashboard-Banner. Ideal, um genau diese Kette gefahrlos zu proben.</text>
  <text x="60" y="966" font-size="12.5" fill="#334155"><tspan font-weight="700">* Monitoring &amp; Wartungsfenster:</tspan>  Die automatische Auslösung greift nur, wenn dem System ein Notfall-Szenario zugeordnet ist.</text>
  <text x="60" y="984" font-size="12.5" fill="#334155">Steht das System in einem Wartungsfenster, wird der Alert nur protokolliert — kein Alarm, kein Vorfall.</text>
</svg>
