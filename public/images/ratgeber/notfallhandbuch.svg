<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Bausteine eines Notfallhandbuchs" font-family="'Instrument Sans', ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
  </defs>
  <rect width="1200" height="675" rx="24" fill="url(#bg)"/>

  <text x="64" y="78" font-size="20" font-weight="600" fill="#4f46e5" letter-spacing="3">NOTFALLHANDBUCH</text>
  <text x="64" y="130" font-size="44" font-weight="700" fill="#0f172a">Die Bausteine im Überblick</text>

  <!-- Karten: 3 x 2 -->
  <g>
    <!-- Reihe 1 -->
    <g>
      <rect x="64" y="200" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="100" cy="246" r="19" fill="#4f46e5"/>
      <path d="M91 246 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="134" y="240" font-size="23" font-weight="700" fill="#0f172a">Rollen &amp; Vertretungen</text>
      <text x="98" y="300" font-size="17" fill="#64748b">Wer entscheidet, wer vertritt –</text>
      <text x="98" y="324" font-size="17" fill="#64748b">je Rolle benannt.</text>
    </g>
    <g>
      <rect x="430" y="200" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="466" cy="246" r="19" fill="#4f46e5"/>
      <path d="M457 246 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="500" y="240" font-size="23" font-weight="700" fill="#0f172a">Kritische Systeme</text>
      <text x="464" y="300" font-size="17" fill="#64748b">Priorisiert nach Wichtigkeit,</text>
      <text x="464" y="324" font-size="17" fill="#64748b">mit Abhängigkeiten.</text>
    </g>
    <g>
      <rect x="796" y="200" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="832" cy="246" r="19" fill="#4f46e5"/>
      <path d="M823 246 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="866" y="240" font-size="23" font-weight="700" fill="#0f172a">Wiederanlaufpläne</text>
      <text x="830" y="300" font-size="17" fill="#64748b">Schritte, Zugänge, Zeitbedarf</text>
      <text x="830" y="324" font-size="17" fill="#64748b">und Ausweichverfahren.</text>
    </g>
    <!-- Reihe 2 -->
    <g>
      <rect x="64" y="380" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="100" cy="426" r="19" fill="#4f46e5"/>
      <path d="M91 426 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="134" y="420" font-size="23" font-weight="700" fill="#0f172a">Notfallkontakte</text>
      <text x="98" y="480" font-size="17" fill="#64748b">Intern, Dienstleister, Behörden –</text>
      <text x="98" y="504" font-size="17" fill="#64748b">auch offline verfügbar.</text>
    </g>
    <g>
      <rect x="430" y="380" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="466" cy="426" r="19" fill="#4f46e5"/>
      <path d="M457 426 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="500" y="420" font-size="23" font-weight="700" fill="#0f172a">Kommunikation</text>
      <text x="464" y="480" font-size="17" fill="#64748b">Vorbereitete Texte für Team,</text>
      <text x="464" y="504" font-size="17" fill="#64748b">Kunden und Partner.</text>
    </g>
    <g>
      <rect x="796" y="380" width="338" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
      <circle cx="832" cy="426" r="19" fill="#4f46e5"/>
      <path d="M823 426 l6 6 l11 -12" fill="none" stroke="#ffffff" stroke-width="3.5" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="866" y="420" font-size="23" font-weight="700" fill="#0f172a">Szenario-Checklisten</text>
      <text x="830" y="480" font-size="17" fill="#64748b">Ransomware, Ausfall, Strom –</text>
      <text x="830" y="504" font-size="17" fill="#64748b">Schritt für Schritt.</text>
    </g>
  </g>

  <text x="64" y="600" font-size="18" fill="#94a3b8">Im Ernstfall sofort verfügbar – als digitales Notfallhandbuch, PDF-Export und Notfallkarte.</text>
</svg>
