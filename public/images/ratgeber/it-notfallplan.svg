<svg viewBox="0 0 1200 675" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Wiederanlauf-Reihenfolge kritischer Systeme nach RTO" font-family="'Instrument Sans', ui-sans-serif, system-ui, sans-serif">
  <defs>
    <linearGradient id="bg3" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#f8fafc"/>
    </linearGradient>
    <marker id="ah3" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M2 2 L10 6 L2 10 z" fill="#94a3b8"/>
    </marker>
  </defs>
  <rect width="1200" height="675" rx="24" fill="url(#bg3)"/>

  <text x="64" y="70" font-size="20" font-weight="600" fill="#4f46e5" letter-spacing="3">IT-NOTFALLPLAN</text>
  <text x="64" y="118" font-size="44" font-weight="700" fill="#0f172a">Wiederanlauf-Reihenfolge</text>

  <!-- RPO-Hinweis -->
  <rect x="780" y="44" width="356" height="86" rx="14" fill="#eef2ff" stroke="#c7d2fe"/>
  <text x="804" y="80" font-size="18" font-weight="700" fill="#3730a3">RTO = max. Ausfallzeit</text>
  <text x="804" y="108" font-size="18" font-weight="700" fill="#3730a3">RPO = max. Datenverlust</text>

  <!-- Treppen-Boxen -->
  <g>
    <rect x="85" y="360" width="190" height="150" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="120" cy="396" r="17" fill="#4f46e5"/><text x="120" y="402" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">1</text>
    <text x="105" y="446" font-size="19" font-weight="700" fill="#0f172a">Netzwerk</text>
    <text x="105" y="470" font-size="19" font-weight="700" fill="#0f172a">&amp; Storage</text>
    <rect x="105" y="482" width="92" height="24" rx="12" fill="#dcfce7"/><text x="151" y="499" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">RTO &lt; 1 h</text>
  </g>
  <g>
    <rect x="295" y="330" width="190" height="180" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="330" cy="366" r="17" fill="#4f46e5"/><text x="330" y="372" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">2</text>
    <text x="315" y="416" font-size="19" font-weight="700" fill="#0f172a">Datenbank</text>
    <rect x="315" y="482" width="78" height="24" rx="12" fill="#dcfce7"/><text x="354" y="499" font-size="14" font-weight="700" fill="#166534" text-anchor="middle">RTO 2 h</text>
  </g>
  <g>
    <rect x="505" y="300" width="190" height="210" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="540" cy="336" r="17" fill="#4f46e5"/><text x="540" y="342" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">3</text>
    <text x="525" y="386" font-size="19" font-weight="700" fill="#0f172a">ERP /</text>
    <text x="525" y="410" font-size="19" font-weight="700" fill="#0f172a">Warenwirt.</text>
    <rect x="525" y="482" width="78" height="24" rx="12" fill="#fef9c3"/><text x="564" y="499" font-size="14" font-weight="700" fill="#854d0e" text-anchor="middle">RTO 4 h</text>
  </g>
  <g>
    <rect x="715" y="270" width="190" height="240" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="750" cy="306" r="17" fill="#4f46e5"/><text x="750" y="312" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">4</text>
    <text x="735" y="356" font-size="19" font-weight="700" fill="#0f172a">Fileserver</text>
    <rect x="735" y="482" width="78" height="24" rx="12" fill="#fef9c3"/><text x="774" y="499" font-size="14" font-weight="700" fill="#854d0e" text-anchor="middle">RTO 8 h</text>
  </g>
  <g>
    <rect x="925" y="240" width="190" height="270" rx="16" fill="#ffffff" stroke="#e2e8f0"/>
    <circle cx="960" cy="276" r="17" fill="#4f46e5"/><text x="960" y="282" font-size="18" font-weight="700" fill="#fff" text-anchor="middle">5</text>
    <text x="945" y="326" font-size="19" font-weight="700" fill="#0f172a">Webshop</text>
    <rect x="945" y="482" width="86" height="24" rx="12" fill="#ffe4e6"/><text x="988" y="499" font-size="14" font-weight="700" fill="#9f1239" text-anchor="middle">RTO 24 h</text>
  </g>

  <!-- Achse -->
  <line x1="85" y1="540" x2="1130" y2="540" stroke="#94a3b8" stroke-width="2.5" marker-end="url(#ah3)"/>
  <text x="85" y="576" font-size="18" fill="#64748b">Zuerst wiederherstellen</text>
  <text x="1130" y="576" font-size="18" fill="#64748b" text-anchor="end">Zeit nach Ausfall →</text>
</svg>
